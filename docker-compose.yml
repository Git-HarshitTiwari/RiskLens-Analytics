version: '3.8'

services:
  risklens:
    build: .
    container_name: risklens-analytics
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - VAR_CONFIDENCE=0.95
      - RISK_FREE_RATE=0.065
      - ROLLING_WINDOW_DAYS=30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s